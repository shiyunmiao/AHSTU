<!-- login.html - 登录页面 -->
{% extends 'base.html' %}
{% block title %}登录 - 校园留言墙{% endblock %}
{% block content %}
<div class="form-card">
    <h2>🔐 登录</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>学号 / 用户名</label>
            <input type="text" name="login_id" placeholder="输入学号或用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="输入密码" required>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" name="remember" id="remember" style="width: auto;">
            <label for="remember" style="margin: 0; font-weight: normal;">记住我（一周内免登录）</label>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
    </form>
    <div class="auth-links">还没有账号？<a href="{{ url_for('register') }}">去注册 →</a></div>
</div>
{% endblock %}
