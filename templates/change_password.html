<!-- change_password.html - 修改密码 -->
{% extends 'base.html' %}
{% block title %}修改密码 - 校园留言墙{% endblock %}
{% block content %}
<div class="form-card">
    <h2>🔑 修改密码</h2>
    <form method="POST" action="{{ url_for('change_password') }}">
        <div class="form-group">
            <label>当前密码</label>
            <input type="password" name="old_password" placeholder="输入当前密码" required>
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" placeholder="至少6位" required>
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" name="confirm" placeholder="再次输入新密码" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">修改密码</button>
    </form>
    <div class="auth-links"><a href="{{ url_for('profile') }}">← 返回个人信息</a></div>
</div>
{% endblock %}
