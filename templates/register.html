<!-- register.html - 注册页面 -->
{% extends 'base.html' %}
{% block title %}注册 - 校园留言墙{% endblock %}
{% block content %}
<div class="form-card">
    <h2>📝 注册账号</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label>学号 <span style="color: var(--danger);">*</span></label>
            <input type="text" name="student_id" placeholder="请输入学号" required>
            <small style="color: var(--text-light); font-size: 0.8rem;">注册后不可修改</small>
        </div>
        <div class="form-group">
            <label>昵称 <span style="color: var(--danger);">*</span></label>
            <input type="text" name="nickname" placeholder="请输入昵称" required>
        </div>
        <div class="form-group">
            <label>密码 <span style="color: var(--danger);">*</span></label>
            <input type="password" name="password" placeholder="至少6位" required>
        </div>
        <div class="form-group">
            <label>确认密码 <span style="color: var(--danger);">*</span></label>
            <input type="password" name="confirm" placeholder="再次输入密码" required>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <span style="font-size: 1.1rem; font-weight: 700; color: var(--primary); padding: 0.5rem 1rem; background: var(--primary-light); border-radius: var(--radius-sm);">
                    {{ captcha_text }}
                </span>
                <input type="text" name="captcha" placeholder="输入计算结果" required
                       style="flex: 1; padding: 0.8rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); background: rgba(255,255,255,0.5); color: var(--text); font-size: 0.95rem; font-family: inherit;">
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
    </form>
    <div class="auth-links">已有账号？<a href="{{ url_for('login') }}">去登录 →</a></div>
</div>
{% endblock %}
